name: Deploy Sites

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/deploy-sites.yml"
      - "apps/docs/**"
      - "apps/example-basic/**"
      - "apps/example-multilang/**"
      - "packages/girk/**"
      - "packages/utils/**"
      - "workers/sites/**"
      - "scripts/build-sites-worker.mjs"
      - "package.json"
      - "package-lock.json"
      - ".nvmrc"
      - ".node-version"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker Sites
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy:sites
